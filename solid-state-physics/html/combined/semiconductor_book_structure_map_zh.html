  <style>
    :root {
      --bg: #eef5ff;
      --paper: rgba(248, 252, 255, 0.92);
      --ink: #11243a;
      --muted: #61758d;
      --line: rgba(148, 183, 222, 0.34);
      --green: #3d7fbe;
      --rust: #5da8e8;
      --sand: rgba(120, 181, 235, 0.12);
      --mint: rgba(223, 239, 255, 0.88);
      --shadow: 0 18px 40px rgba(65, 108, 157, 0.10);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      color: var(--ink);
      font-family: "Noto Sans TC", "PingFang TC", "Microsoft JhengHei", sans-serif;
      line-height: 1.72;
      background:
        radial-gradient(circle at top left, rgba(132, 195, 255, 0.22), transparent 24%),
        radial-gradient(circle at top right, rgba(93, 168, 232, 0.16), transparent 20%),
        linear-gradient(180deg, #f7fbff 0%, #edf4fb 52%, #e8f0f9 100%);

    .wrap {
      width: min(1180px, calc(100vw - 28px));
      margin: 0 auto;
      padding: 28px 0 56px;
    }

    .hero,
    .panel {
      background: var(--paper);
      border: 1px solid var(--line);
      border-radius: 24px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
    }

    .hero {
      padding: 34px;
      margin-bottom: 22px;
    }

    .eyebrow {
      display: inline-block;
      padding: 6px 12px;
      border-radius: 999px;
      background: rgba(93, 168, 232, 0.12);
      color: var(--green);
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.08em;
      border: 1px solid rgba(93, 168, 232, 0.16);
    }

    h1, h2, h3 {
      margin: 0;
      font-family: "Segoe UI", "Noto Sans TC", "PingFang TC", sans-serif;
      letter-spacing: 0;
    }

    h1 {
      margin-top: 16px;
      font-size: clamp(2rem, 4vw, 3.25rem);
      line-height: 1.1;
    }

    h2 {
      font-size: 1.8rem;
      margin-bottom: 10px;
    }

    .lead {
      margin: 16px 0 0;
      max-width: 920px;
      color: var(--muted);
      font-size: 1.02rem;
    }

    .hero-links {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 22px;
    }

    .link-btn,
    .resource-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 10px 16px;
      border-radius: 999px;
      text-decoration: none;
      font-weight: 700;
      transition: transform 0.16s ease, background 0.16s ease;
    }

    .link-btn {
      background: rgba(255, 255, 255, 0.76);
      border: 1px solid rgba(93, 168, 232, 0.24);
      color: var(--green);
    }

    .resource-link {
      background: rgba(93, 168, 232, 0.10);
      color: var(--green);
      border: 1px solid rgba(93, 168, 232, 0.20);
    }

    .link-btn:hover,
    .resource-link:hover {
      transform: translateY(-1px);
      background: rgba(255, 255, 255, 0.94);
    }

    .panel {
      padding: 28px;
      margin-bottom: 20px;
    }

    .panel p {
      margin: 0;
      color: var(--muted);
    }

    .flow-grid,
    .chapter-grid,
    .derive-grid {
      display: grid;
      gap: 18px;
      margin-top: 20px;
    }

    .flow-grid {
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    }

    .chapter-grid {
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    }

    .derive-grid {
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
    }

    .flow-card,
    .chapter-card,
    .derive-card {
      border-radius: 18px;
      padding: 20px;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.96), rgba(241, 247, 255, 0.90));
      border: 1px solid rgba(148, 183, 222, 0.28);
    }

    .flow-card {
      background: linear-gradient(180deg, rgba(233, 245, 255, 0.95), rgba(248, 252, 255, 0.98));
      border-left: 5px solid var(--green);
    }

    .chapter-card {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .chapter-card summary {
      list-style: none;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .chapter-card summary::-webkit-details-marker {
      display: none;
    }

    .chapter-summary-line {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      color: var(--muted);
      font-size: 0.94rem;
      font-weight: 700;
    }

    .chapter-summary-line::after {
      content: "ж’…оҹЈ?";
      color: var(--rust);
      font-size: 0.85rem;
      letter-spacing: 0.03em;
    }

    .chapter-card[open] .chapter-summary-line::after {
      content: "?е—үзөІ";
    }

    .chapter-body {
      margin-top: 14px;
      padding-top: 14px;
      border-top: 1px solid rgba(148, 183, 222, 0.24);
    }

    .chapter-body h4 {
      margin: 14px 0 6px;
      color: var(--green);
      font-size: 1rem;
    }

    .chapter-body h4:first-child {
      margin-top: 0;
    }

    .chapter-no {
      display: inline-block;
      width: fit-content;
      padding: 5px 10px;
      border-radius: 999px;
      background: rgba(93, 168, 232, 0.12);
      color: var(--green);
      font-size: 0.85rem;
      font-weight: 700;
      border: 1px solid rgba(93, 168, 232, 0.15);
    }

    .bullet {
      margin: 0;
      padding-left: 20px;
      color: var(--ink);
    }

    .bullet li {
      margin: 6px 0;
    }

    .resource-links {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: auto;
    }

    .eq {
      margin: 10px 0 0;
      padding: 10px 12px;
      border-radius: 14px;
      background: var(--mint);
      border-left: 4px solid var(--green);
      font-family: Consolas, "SFMono-Regular", monospace;
      font-size: 0.95rem;
      overflow-wrap: anywhere;
      word-break: break-word;
      white-space: normal;
    }

    .small {
      margin-top: 10px;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .derive-step {
      margin-top: 14px;
      padding: 14px;
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.78);
      border: 1px solid rgba(148, 183, 222, 0.22);
    }

    .derive-step:first-of-type {
      margin-top: 0;
    }

    .derive-step strong {
      color: var(--green);
    }

    .footer-note {
      margin-top: 18px;
      padding: 16px 18px;
      border-radius: 18px;
      background: rgba(93, 168, 232, 0.08);
      color: #33597e;
      border: 1px solid rgba(148, 183, 222, 0.22);
    }

    .map-stage {
      margin-top: 22px;
      display: grid;
      gap: 16px;
    }

    .map-grid {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(260px, 0.9fr) minmax(0, 1fr);
      gap: 20px;
      align-items: stretch;
      padding: 20px;
      border-radius: 22px;
      background:
        radial-gradient(circle at 50% 10%, rgba(93, 168, 232, 0.08), transparent 24%),
        linear-gradient(180deg, rgba(231, 243, 255, 0.72), rgba(248, 252, 255, 0.98));
      border: 1px solid rgba(148, 183, 222, 0.22);
    }

    .map-column {
      display: grid;
      gap: 12px;
      align-content: start;
      position: relative;
    }

    .map-label {
      display: inline-flex;
      align-items: center;
      width: fit-content;
      padding: 5px 11px;
      border-radius: 999px;
      background: rgba(93, 168, 232, 0.10);
      color: var(--green);
      font-size: 0.79rem;
      font-weight: 700;
      letter-spacing: 0.03em;
      margin-bottom: 2px;
    }

    .map-core {
      display: grid;
      place-items: center;
      min-height: 100%;
      padding: 22px;
      border-radius: 24px;
      background: linear-gradient(180deg, rgba(108, 174, 234, 0.96), rgba(67, 129, 193, 0.95));
      color: #f8f5ee;
      border: 1px solid rgba(93, 168, 232, 0.18);
      box-shadow: 0 14px 28px rgba(74, 127, 185, 0.18);
      text-align: center;
    }

    .map-core p,
    .map-core .small {
      color: rgba(248, 245, 238, 0.9);
    }

    .chapter-btn {
      width: 100%;
      text-align: left;
      padding: 15px 17px;
      border-radius: 14px;
      border: 1px solid rgba(148, 183, 222, 0.24);
      border-left: 4px solid rgba(93, 168, 232, 0.30);
      background: rgba(255, 255, 255, 0.80);
      color: var(--ink);
      cursor: pointer;
      transition: transform 0.16s ease, border-color 0.16s ease, box-shadow 0.16s ease, background 0.16s ease, border-left-color 0.16s ease;
    }

    .chapter-btn:hover {
      transform: translateY(-2px);
      border-color: rgba(93, 168, 232, 0.34);
      border-left-color: rgba(93, 168, 232, 0.62);
      box-shadow: 0 10px 20px rgba(74, 127, 185, 0.10);
    }

    .chapter-btn.active {
      border-color: rgba(93, 168, 232, 0.40);
      border-left-color: rgba(61, 127, 190, 0.96);
      background: linear-gradient(180deg, rgba(231, 243, 255, 0.96), rgba(248, 252, 255, 1));
      box-shadow: 0 12px 24px rgba(74, 127, 185, 0.12);
    }

    .chapter-btn strong {
      display: block;
      color: var(--green);
      font-size: 1rem;
    }

    .chapter-btn span {
      display: block;
      margin-top: 6px;
      color: var(--muted);
      font-size: 0.9rem;
      line-height: 1.45;
    }

    .focus-note {
      border-radius: 18px;
      padding: 22px 24px;
      background: linear-gradient(180deg, rgba(231, 243, 255, 0.62), rgba(248, 252, 255, 0.98));
      border: 1px solid rgba(148, 183, 222, 0.24);
      box-shadow: 0 10px 18px rgba(74, 127, 185, 0.06);
    }

    .focus-note h3 {
      margin-bottom: 10px;
      font-size: 1.35rem;
    }

    .focus-note p {
      color: var(--ink);
    }

    .mindmap-wrap {
      margin-top: 22px;
    }

    .mindmap {
      display: grid;
      grid-template-columns: minmax(220px, 0.9fr) repeat(3, minmax(0, 1fr));
      gap: 18px;
      align-items: start;
    }

    .mind-root,
    .mind-node {
      position: relative;
      border-radius: 18px;
      padding: 18px;
      background: linear-gradient(180deg, rgba(236, 246, 255, 0.92), rgba(248, 252, 255, 0.98));
      border: 1px solid rgba(148, 183, 222, 0.24);
      box-shadow: 0 10px 22px rgba(74, 127, 185, 0.08);
    }

    .mind-root {
      background: linear-gradient(180deg, rgba(108, 174, 234, 0.94), rgba(67, 129, 193, 0.96));
      color: #f8f5ee;
    }

    .mind-root p,
    .mind-root .small {
      color: rgba(248, 245, 238, 0.88);
    }

    .mind-column {
      display: grid;
      gap: 16px;
    }

    .mind-node::before {
      content: "";
      position: absolute;
      left: -18px;
      top: 50%;
      width: 18px;
      border-top: 2px solid rgba(93, 168, 232, 0.28);
    }

    .mind-branch {
      display: grid;
      gap: 10px;
      margin-top: 12px;
      padding-left: 14px;
      border-left: 2px solid rgba(93, 168, 232, 0.18);
    }

    .mind-leaf {
      padding: 10px 12px;
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.82);
      border: 1px solid rgba(148, 183, 222, 0.18);
      font-size: 0.94rem;
      color: var(--ink);
    }

    .mind-leaf strong {
      color: var(--green);
    }

    @media (max-width: 720px) {
      .wrap {
        width: min(100vw - 18px, 1180px);
        padding-top: 18px;
      }

      .hero,
      .panel {
        padding: 22px;
        border-radius: 22px;
      }

      .map-grid {
        grid-template-columns: 1fr;
        padding: 14px;
      }

      .mindmap {
        grid-template-columns: 1fr;
      }

      .mind-node::before {
        display: none;
      }
    }

    @media (max-width: 1024px) {
      .map-grid {
        grid-template-columns: 1fr 1fr;
      }

      .map-core {
        grid-column: 1 / -1;
      }

      .mindmap {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .mind-root {
        grid-column: 1 / -1;
      }
    }

    @media (max-width: 860px) {
      .mindmap {
        grid-template-columns: 1fr;
      }

      .mind-node::before {
        display: none;
      }
    }

    .poster-section {
      margin-top: 26px;
    }

      display: none;
    }

    .poster-grid {

      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 18px;

    .poster-card {

      border-radius: 20px;
      border: 1px solid rgba(135, 176, 222, 0.32);

      transition: transform 0.18s ease, box-shadow 0.18s ease;
    }

    .poster-card img:hover {
      transform: translateY(-2px);
      box-shadow: 0 14px 28px rgba(71, 113, 160, 0.14);
    }

    .image-lightbox {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: rgba(10, 21, 38, 0.78);
      backdrop-filter: blur(8px);
    }

    .image-lightbox.is-open {
      display: flex;
    }

    .image-lightbox-dialog {
      position: relative;
      width: min(1100px, calc(100vw - 48px));
      max-height: calc(100vh - 48px);
      padding: 18px 18px 14px;
      border-radius: 22px;
      border: 1px solid rgba(179, 216, 255, 0.32);
      background: linear-gradient(180deg, rgba(247, 251, 255, 0.98), rgba(232, 242, 252, 0.96));
      box-shadow: 0 24px 60px rgba(0, 0, 0, 0.28);
      overflow: hidden;
    }

    .image-lightbox-close {
      position: absolute;
      top: 10px;
      right: 10px;
      width: 42px;
      height: 42px;
      border: 0;
      border-radius: 999px;
      background: rgba(61, 127, 190, 0.12);
      color: var(--ink);
      font-size: 1.45rem;
      line-height: 1;
      cursor: pointer;
      z-index: 2;
    }

    .image-lightbox-close:hover {
      background: rgba(61, 127, 190, 0.2);
    }

    .image-lightbox-nav {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      width: 48px;
      height: 48px;
      border: 0;
      border-radius: 999px;
      background: rgba(61, 127, 190, 0.14);
      color: var(--ink);
      font-size: 1.5rem;
      line-height: 1;
      cursor: pointer;
      z-index: 2;
    }

    .image-lightbox-nav:hover {
      background: rgba(61, 127, 190, 0.24);
    }

    .image-lightbox-prev {
      left: 10px;
    }

    .image-lightbox-next {
      right: 10px;
    }

    .image-lightbox figure {
      margin: 0;
    }

    .image-lightbox-viewport {
      overflow: hidden;
      border-radius: 16px;
      cursor: grab;
      touch-action: none;
      background: #f8fbff;
    }

    .image-lightbox-viewport.is-dragging {
      cursor: grabbing;
    }

    .image-lightbox img {
      display: block;
      width: 100%;
      max-height: calc(100vh - 150px);
      object-fit: contain;
      border-radius: 16px;
      border: 1px solid rgba(135, 176, 222, 0.26);
      background: #f8fbff;
      transform-origin: center center;
      user-select: none;
      -webkit-user-drag: none;
    }

    .image-lightbox figcaption {
      margin-top: 12px;
      color: var(--muted);
      font-size: 0.96rem;
    }

    .image-lightbox-hint {
      margin-top: 8px;
      color: var(--muted);
      font-size: 0.88rem;
    }
  </style>

        body: "Chapter 14 ??bandgap?ој»о’Ў?е—ҡВҖој»??оё„?ж‘®о“ҢВҖојҫж’’ж’ п„’е„”?пҺҮоҚ”??photodiode?о»«olar cell?о»„ED?о»Өaser?оҪҳhapter 15 ?пҡҳ? junction ??transport ?е…ёпҚ‘ж“ғоҰ¶о№ӯ?ојҝ??йўҜВҖојҝ??оёғ?з’ҮоіҶиҫЈ?оҝҡ?йҹҸз‘ҡ??оҗІоЎҮйҠқоЎҫ?еҡ—п—әпҶҖж’–йҳЎ??иҮ¬оҜӯ?е…ё??пҪҒоҫ–жҶҹоӨқзҲё?е—ҡВҖ?
      }
    };

    const mapButtons = Array.from(document.querySelectorAll(".chapter-btn"));
    const focusNote = document.getElementById("focusNote");

    function updateMapNote(key) {
      const note = mapNotes[key];
      if (!note || !focusNote) return;

      focusNote.innerHTML = "<h3>" + note.title + "</h3><p>" + note.body + "</p>";
      mapButtons.forEach((button) => {
        button.classList.toggle("active", button.dataset.note === key);
      });
    }

    mapButtons.forEach((button) => {
      button.addEventListener("click", () => updateMapNote(button.dataset.note));
    });

    const posterImages = Array.from(document.querySelectorAll(".poster-card img"));
    const lightbox = document.getElementById("imageLightbox");
    const lightboxImage = document.getElementById("lightboxImage");
    const lightboxCaption = document.getElementById("lightboxCaption");
    const lightboxClose = document.getElementById("imageLightboxClose");
    const lightboxPrev = document.getElementById("imageLightboxPrev");
    const lightboxNext = document.getElementById("imageLightboxNext");
    const lightboxViewport = document.getElementById("imageLightboxViewport");
    let currentPosterIndex = 0;
    let currentScale = 1;
    let currentTranslateX = 0;
    let currentTranslateY = 0;
    let isDragging = false;
    let dragStartX = 0;
    let dragStartY = 0;
    let lastTouchDistance = 0;
    let initialTouchScale = 1;

    function clamp(value, min, max) {
      return Math.min(max, Math.max(min, value));
    }

    function applyImageTransform() {
      if (!lightboxImage) return;
      lightboxImage.style.transform =
        "translate(" + currentTranslateX + "px, " + currentTranslateY + "px) scale(" + currentScale + ")";
    }

    function resetImageTransform() {
      currentScale = 1;
      currentTranslateX = 0;
      currentTranslateY = 0;
      applyImageTransform();
    }

    function setPosterByIndex(index) {
      if (!posterImages.length || !lightboxImage || !lightboxCaption) return;
      currentPosterIndex = (index + posterImages.length) % posterImages.length;
      const image = posterImages[currentPosterIndex];
      lightboxImage.src = image.src;
      lightboxImage.alt = image.alt;
      lightboxCaption.textContent = image.alt;
      resetImageTransform();
    }

    function openLightbox(image) {
      if (!lightbox) return;
      const index = posterImages.indexOf(image);
      setPosterByIndex(index >= 0 ? index : 0);
      lightbox.classList.add("is-open");
      lightbox.setAttribute("aria-hidden", "false");
      document.body.style.overflow = "hidden";
    }

    function closeLightbox() {
      if (!lightbox || !lightboxImage || !lightboxCaption) return;
      lightbox.classList.remove("is-open");
      lightbox.setAttribute("aria-hidden", "true");
      lightboxImage.src = "";
      lightboxImage.alt = "";
      lightboxCaption.textContent = "";
      document.body.style.overflow = "";
      resetImageTransform();
    }

    function showPreviousPoster() {
      setPosterByIndex(currentPosterIndex - 1);
    }

    function showNextPoster() {
      setPosterByIndex(currentPosterIndex + 1);
    }

    posterImages.forEach((image) => {
      image.addEventListener("click", () => openLightbox(image));
    });

    if (lightbox && lightboxClose) {
      lightboxClose.addEventListener("click", closeLightbox);
      if (lightboxPrev) {
        lightboxPrev.addEventListener("click", showPreviousPoster);
      }
      if (lightboxNext) {
        lightboxNext.addEventListener("click", showNextPoster);
      }
      lightbox.addEventListener("click", (event) => {
        if (event.target === lightbox) {
          closeLightbox();
        }
      });
      document.addEventListener("keydown", (event) => {
        if (!lightbox.classList.contains("is-open")) return;
        if (event.key === "Escape") {
          closeLightbox();
        }
        if (event.key === "ArrowLeft") {
          showPreviousPoster();
        }
        if (event.key === "ArrowRight") {
          showNextPoster();
        }
      });
    }

    if (lightboxViewport && lightboxImage) {
      lightboxViewport.addEventListener(
        "wheel",
        (event) => {
          if (!lightbox.classList.contains("is-open")) return;
          event.preventDefault();
          const delta = event.deltaY < 0 ? 0.14 : -0.14;
          currentScale = clamp(currentScale + delta, 1, 4);
          if (currentScale === 1) {
            currentTranslateX = 0;
            currentTranslateY = 0;
          }
          applyImageTransform();
        },
        { passive: false }
      );

      lightboxViewport.addEventListener("pointerdown", (event) => {
        if (currentScale <= 1) return;
        isDragging = true;
        dragStartX = event.clientX - currentTranslateX;
        dragStartY = event.clientY - currentTranslateY;
        lightboxViewport.classList.add("is-dragging");
      });

      lightboxViewport.addEventListener("pointermove", (event) => {
        if (!isDragging) return;
        currentTranslateX = event.clientX - dragStartX;
        currentTranslateY = event.clientY - dragStartY;
        applyImageTransform();
      });

      ["pointerup", "pointerleave", "pointercancel"].forEach((eventName) => {
        lightboxViewport.addEventListener(eventName, () => {
          isDragging = false;
          lightboxViewport.classList.remove("is-dragging");
        });
      });

      lightboxViewport.addEventListener(
        "touchmove",
        (event) => {
          if (event.touches.length !== 2) return;
          event.preventDefault();
          const dx = event.touches[0].clientX - event.touches[1].clientX;
          const dy = event.touches[0].clientY - event.touches[1].clientY;
          const distance = Math.hypot(dx, dy);
          if (!lastTouchDistance) {
            lastTouchDistance = distance;
            initialTouchScale = currentScale;
            return;
          }
          const ratio = distance / lastTouchDistance;
          currentScale = clamp(initialTouchScale * ratio, 1, 4);
          if (currentScale === 1) {
            currentTranslateX = 0;
            currentTranslateY = 0;
          }
          applyImageTransform();
        },
        { passive: false }
      );

      ["touchend", "touchcancel"].forEach((eventName) => {
        lightboxViewport.addEventListener(eventName, () => {
          if (eventName) {
            lastTouchDistance = 0;
            initialTouchScale = currentScale;
          }
        });
      });
    }
  </script>
