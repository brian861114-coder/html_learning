<script>
function toggleTheme(){
  const html = document.documentElement;
  const isDark = html.getAttribute('data-theme') === 'dark';
  html.setAttribute('data-theme', isDark ? 'light' : 'dark');
  document.getElementById('themeBtn').textContent = isDark ? '🌙 深色模式' : '☀️ 淺色模式';
  localStorage.setItem('calc-theme', isDark ? 'light' : 'dark');
}
(function(){
  const s = localStorage.getItem('calc-theme');
  if (s === 'dark') { document.documentElement.setAttribute('data-theme','dark'); document.getElementById('themeBtn').textContent='☀️ 淺色模式'; }
})();
</script>
